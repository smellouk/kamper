# Publishes the react-native-kamper npm package on each
# kamper/ui/rn-* GitHub Release. Skips root-component releases.
name: Publish npm

on:
  release:
    types: [published]

jobs:
  publish:
    # Only run for RN-component releases (tag starts with kamper/ui/rn-).
    if: ${{ startsWith(github.event.release.tag_name, 'kamper/ui/rn-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: kamper/ui/rn
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Configure Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build (if build script exists)
        run: npm run build --if-present

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
