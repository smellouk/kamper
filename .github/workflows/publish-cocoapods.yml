# Builds the Konitor XCFramework on macOS, attaches the zipped framework
# to the GitHub Release as Konitor.xcframework.zip, then publishes the
# podspec to CocoaPods trunk so the source URL is resolvable for consumers.
name: Publish CocoaPods

on:
  release:
    types: [published]

jobs:
  publish:
    # Only run for root-component releases (tag starts with v); skip RN releases.
    if: ${{ !startsWith(github.event.release.tag_name, 'libs/ui/rn-') }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build XCFramework
        run: ./gradlew :libs:apple-sdk:assembleKonitorReleaseXCFramework --no-configuration-cache

      - name: Verify XCFramework output
        run: |
          test -d libs/apple-sdk/build/XCFrameworks/release/Konitor.xcframework \
            || (echo "Konitor.xcframework directory missing" && exit 1)

      - name: Zip XCFramework
        working-directory: libs/apple-sdk/build/XCFrameworks/release
        run: zip -r Konitor.xcframework.zip Konitor.xcframework

      - name: Upload XCFramework to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            libs/apple-sdk/build/XCFrameworks/release/Konitor.xcframework.zip \
            --clobber

      - name: Push to CocoaPods trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push Konitor.podspec --allow-warnings --skip-import-validation
