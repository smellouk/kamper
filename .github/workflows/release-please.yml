# Release Please — opens version-bump PRs from Conventional Commits and creates
# GitHub Releases on merge. Downstream publish workflows trigger on: release: types: [published].
name: Release Please

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      rn_release_created: ${{ steps.release.outputs['kamper/ui/rn--release_created'] }}
      rn_tag_name: ${{ steps.release.outputs['kamper/ui/rn--tag_name'] }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: develop
