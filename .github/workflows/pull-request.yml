# Pipeline to run checks on a created Pull Request.
# Two parallel jobs: gradle (build/test/lint) and commitlint (PR title validation).
name: Pull request checker

on:
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  gradle:
    name: Pull request checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Gradle Files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/
            ~/.gradle/wrapper/
          key: cache-gradle

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle detekting
        run: ./gradlew detekt

      - name: Gradle linting
        run: ./gradlew lint

      - name: Gradle Testing
        run: ./gradlew test

      - name: Gradle Assembling
        run: ./gradlew assemble

  commitlint:
    name: PR title lint
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
