name: Feature Request
description: Propose a new feature or behavior change
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposed_api
    attributes:
      label: Proposed API or behavior
      description: How would a developer use this feature?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
