apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

// konitor.android.config (from build-logic) sets compileSdk=35, minSdk=21, Java 17.
// Available in the monorepo build context; absent in the demo autolink context — skipped safely.
try {
    apply plugin: 'konitor.android.config'
} catch (org.gradle.api.plugins.UnknownPluginException ignored) { }

// com.facebook.react configures codegen and build-config fields for RN turbo modules.
// Available only in the RN demo context (node_modules/@react-native/gradle-plugin present).
try {
    apply plugin: 'com.facebook.react'
} catch (org.gradle.api.plugins.UnknownPluginException ignored) { }

android {
    namespace 'com.smellouk.konitor.rn'
    // Explicit compileSdk: ensures it is always set even when konitor.android.config is absent.
    compileSdk = 35
    defaultConfig {
        // minSdk 24: RN 0.85 minimum; overrides the konitor.android.config default of 21.
        minSdk 24
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main {
            java {
                srcDirs += ["${project.buildDir}/generated/source/codegen/java"]
            }
        }
    }
}

dependencies {
    // react-android is only resolvable when com.facebook.react plugin is active (RN demo context).
    if (project.plugins.hasPlugin('com.facebook.react')) {
        implementation 'com.facebook.react:react-android'
    }

    // Dual-context dependency strategy:
    //   Monorepo context  → project(':libs:...') resolves directly within the same build.
    //   Demo autolink context → Maven coordinates; Gradle substitutes them with the monorepo
    //     projects via the demo's `includeBuild('../../../')` composite-build rule.
    if (findProject(':libs:engine') != null) {
        implementation project(':libs:engine')
        implementation project(':libs:modules:cpu')
        implementation project(':libs:modules:fps')
        implementation project(':libs:modules:memory')
        implementation project(':libs:modules:network')
        implementation project(':libs:modules:issues')
        implementation project(':libs:modules:jank')
        implementation project(':libs:modules:gc')
        implementation project(':libs:modules:thermal')
        implementation project(':libs:modules:gpu')
        implementation project(':libs:rn')
        debugImplementation project(':libs:ui:kmm')
    } else {
        // Version string is a placeholder; composite-build substitution ignores the version.
        def v = "local"
        implementation "com.smellouk.konitor:engine:$v"
        implementation "com.smellouk.konitor:cpu-module:$v"
        implementation "com.smellouk.konitor:fps-module:$v"
        implementation "com.smellouk.konitor:memory-module:$v"
        implementation "com.smellouk.konitor:network-module:$v"
        implementation "com.smellouk.konitor:issues-module:$v"
        implementation "com.smellouk.konitor:jank-module:$v"
        implementation "com.smellouk.konitor:gc-module:$v"
        implementation "com.smellouk.konitor:thermal-module:$v"
        implementation "com.smellouk.konitor:gpu-module:$v"
        implementation "com.smellouk.konitor:rn:$v"
        debugImplementation "com.smellouk.konitor:kmm:$v"
    }
}
